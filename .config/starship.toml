format = """
[Óā∂](1)\
$os\
$username\
[Óāį](bg:2 fg:prev_bg)\
$directory\
[Óāį](fg:prev_bg bg:3)\
$git_branch\
$git_status\
[Óāį](fg:prev_bg bg:4)\
$c\
$dotnet\
$elixir\
$elm\
$golang\
$gradle\
$haskell\
$java\
$julia\
$nodejs\
$nim\
$rust\
$scala\
[Óāį](fg:prev_bg bg:5)\
$docker_context\
[Óāį ](fg:prev_bg)\
$line_break$character
"""

add_newline = false

[profiles]
transient = """$character"""

# You can also replace your username with a neat symbol like ÔĄ†  or disable this
# and use the os module below
[username]
show_always = true
style_user = "bg:prev_fg"
style_root = "bg:prev_fg bold"
format = '[$user]($style)'
aliases = { "moises" = "ÔÄá", "root" = "ůįěĄ" }
disabled = false

[character]
disabled = false
success_symbol = '[ÔĄĀ](bold fg:color_green)'
error_symbol = '[ÔĄĀ](bold fg:color_red)'
vimcmd_symbol = '[ÔĄÄ](bold fg:color_green)'
vimcmd_replace_one_symbol = '[ÔĄÄ](bold fg:color_purple)'
vimcmd_replace_symbol = '[ÔĄÄ](bold fg:color_purple)'
vimcmd_visual_symbol = '[ÔĄÄ](bold fg:color_yellow)'

# An alternative to the username module which displays a symbol that
# represents the current operating system
[os]
style = "bg:prev_fg"
disabled = true # Disabled by default

[directory]
style = "bg:prev_bg"
format = "[ $path ]($style)"
truncation_length = 2
truncation_symbol = "‚Ä¶/"

# Here is how you can shorten some long paths by text replacement
# similar to mapped_locations in Oh My Posh:
[directory.substitutions]
"Documents" = "ůįąô "
"Downloads" = "ÔÄô "
"Music" = "ÔÄĀ "
"Pictures" = "ÔÄĺ "
# Keep in mind that the order matters. For example:
# "Important Documents" = " ůįąôÔĄ™ "
# will not be replaced, because "Documents" was already substituted before.
# So either put "Important Documents" before "Documents" or use the substituted version:
# "Important ůįąô " = " ůįąôÔĄ™ "

