set -g status-style "bg=default,fg=#%%color7%%"
set -g message-style "bg=#%%color12%%,fg=#%%color0%%,bold"
set -g mode-style "bg=#%%color11%%,fg=#%%color0%%,bold"
set -g pane-border-style "fg=#%%color8%%"
set -g pane-active-border-style "fg=#%%color12%%"
setw -g window-status-activity-style "default"
setw -g window-status-bell-style "default"
set -g @window-pill-normal-left "#[fg=#%%color8%%,bg=default]#[fg=#%%color7%%,bg=#%%color8%%]"
set -g @window-pill-normal-right "#[fg=#%%color8%%,bg=default]"
set -g @window-pill-activity-left "#[fg=#%%color10%%,bg=default]#[fg=#%%color0%%,bg=#%%color10%%,bold]"
set -g @window-pill-activity-right "#[fg=#%%color10%%,bg=default]"
set -g @window-pill-bell-left "#[fg=#%%color9%%,bg=default]#[fg=#%%color0%%,bg=#%%color9%%,bold]"
set -g @window-pill-bell-right "#[fg=#%%color9%%,bg=default]"
set -g status-left "#[fg=#%%color12%%,bg=default]#[fg=#%%color0%%,bg=#%%color12%%,bold] 󱂬 #S #[fg=#%%color12%%,bg=#%%color8%%]#[fg=#%%color7%%,bg=#%%color8%%] 󰒋 #H #[fg=#%%color8%%,bg=default]"
set -g status-right "#{?client_prefix,#[fg=#%%color9%%,bg=default]#[fg=#%%color0%%,bg=#%%color9%%,bold] 󰘳 PREFIX #[fg=#%%color9%%,bg=default] ,}#{?pane_in_mode,#[fg=#%%color11%%,bg=default]#[fg=#%%color0%%,bg=#%%color11%%,bold] 󰆏 COPY #[fg=#%%color11%%,bg=default] ,}#{?window_zoomed_flag,#[fg=#%%color10%%,bg=default]#[fg=#%%color0%%,bg=#%%color10%%,bold] 󰁌 ZOOM #[fg=#%%color10%%,bg=default] ,}#(sh \"$HOME/.config/tmux/battery-segment.sh\" \"default\" \"#%%color8%%\" \"#%%color7%%\")#(sh \"$HOME/.config/tmux/now-playing-segment.sh\" \"default\" \"#%%color6%%\" \"#%%color0%%\" \"#%%color12%%\" \"#%%color0%%\")"
setw -g window-status-format "#{?window_bell_flag,#{@window-pill-bell-left},#{?window_activity_flag,#{@window-pill-activity-left},#{@window-pill-normal-left}}}#{?window_activity_flag, 󱅫,}#{?window_bell_flag, 󰂞,} #I #W #{?window_bell_flag,#{@window-pill-bell-right},#{?window_activity_flag,#{@window-pill-activity-right},#{@window-pill-normal-right}}}#[default]"
setw -g window-status-current-format "#[fg=#%%color11%%,bg=default]#[fg=#%%color0%%,bg=#%%color11%%,bold]#{?window_activity_flag, 󱅫,}#{?window_bell_flag, 󰂞,} #I #W#{?window_zoomed_flag, 󰁌,} #[fg=#%%color11%%,bg=default]#[default]"
