set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-ghostty:RGB,ghostty:RGB,kitty:RGB,*256color:Tc"
set -g focus-events on
set -g history-limit 50000
set -g mouse on
set -g renumber-windows on
set -g set-clipboard on
set -g set-titles on
set -g set-titles-string "#W"
set -s escape-time 0

set -g base-index 1
setw -g pane-base-index 1
setw -g mode-keys vi

set -g default-command 'exec "${XDG_CONFIG_HOME:-$HOME/.config}/shell/launch-shell.sh"'

unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
bind e new-window -c "#{pane_current_path}" "nvim"
bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux config reloaded"

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

bind -r C-h previous-window
bind -r C-l next-window
bind Tab last-window

bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

if-shell 'command -v pbcopy >/dev/null 2>&1' \
  'bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"'
if-shell 'command -v wl-copy >/dev/null 2>&1' \
  'bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "wl-copy"'
if-shell 'command -v xclip >/dev/null 2>&1' \
  'bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -in"'

set -g status-position bottom
set -g status-interval 5
set -g status-justify centre
set -g status-left-length 64
set -g status-right-length 256
source-file ~/.cache/hellwal/tmux.conf

setw -g automatic-rename on
setw -g allow-rename on
setw -g automatic-rename-format '#(sh "$HOME/.config/tmux/window-title.sh" "#{pane_current_command}" "#{pane_current_path}")'
setw -g window-status-separator " "
